name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Job 1: Build HTML site + release tarball ─────────────────────────────
  build-html:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe --tags
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build HTML site and release tarball
        run: python build/build_all.py --skip-integrity
        # build_zim.py exits 0 (graceful skip) when zimwriterfs is absent;
        # ZIM is built separately in the build-zim job below.

      - name: Upload HTML output
        uses: actions/upload-artifact@v4
        with:
          name: html-output
          path: output/html/
          retention-days: 1

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: output/open-circuits-*.tar.gz
          retention-days: 1

  # ── Job 2: Build ZIM using apt-installed zimwriterfs ─────────────────────
  build-zim:
    runs-on: ubuntu-latest
    needs: build-html

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install zim-tools
        run: sudo apt-get install -y zim-tools

      - name: Download HTML output
        uses: actions/download-artifact@v4
        with:
          name: html-output
          path: output/html/

      - name: Build ZIM
        run: python build/build_zim.py

      - name: Upload ZIM
        uses: actions/upload-artifact@v4
        with:
          name: release-zim
          path: output/open-circuits.zim
          retention-days: 1

  # ── Job 3: Create GitHub Release with both artifacts ─────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [build-html, build-zim]

    steps:
      - name: Download release tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: output/

      - name: Download ZIM
        uses: actions/download-artifact@v4
        with:
          name: release-zim
          path: output/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            output/*.tar.gz
            output/open-circuits.zim
