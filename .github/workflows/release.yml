name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe --tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install zimwriterfs (if available)
        run: sudo apt-get install -y zimwriterfs 2>/dev/null || echo "zimwriterfs not available — ZIM will not be attached"

      - name: Build all
        run: python build/build_all.py --skip-integrity

      - name: Collect release assets
        id: assets
        run: |
          TARBALL=$(ls output/open-circuits-*.tar.gz 2>/dev/null | head -1)
          ZIM=output/open-circuits.zim
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          if [ -f "$ZIM" ]; then
            echo "zim=${ZIM}" >> "$GITHUB_OUTPUT"
          else
            echo "zim=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.tarball }}
            ${{ steps.assets.outputs.zim != '' && steps.assets.outputs.zim || '' }}
