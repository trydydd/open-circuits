name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install zim-tools 3.6.0
        run: |
          curl -L https://download.openzim.org/release/zim-tools/zim-tools_linux-x86_64-3.6.0.tar.gz \
            -o /tmp/zim-tools.tar.gz
          tar -xf /tmp/zim-tools.tar.gz -C /tmp
          echo "/tmp/zim-tools_linux-x86_64-3.6.0" >> $GITHUB_PATH

      - name: Build
        env:
          MAGIC: /usr/share/misc/magic.mgc
        run: python build/build_all.py --skip-integrity

      - name: Verify — no external URLs in output
        run: python build/verify_content_integrity.py

      - name: Verify — attribution notice present
        run: |
          grep -q "LICENSE.txt"    output/html/index.html
          grep -q "ATTRIBUTION.md" output/html/index.html
          echo "Attribution notice verified."

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-circuits-html
          path: output/html/
          retention-days: 7

      - name: Upload ZIM artifact (if built)
        uses: actions/upload-artifact@v4
        if: hashFiles('output/open-circuits.zim') != ''
        with:
          name: open-circuits-zim
          path: output/open-circuits.zim
          retention-days: 7
