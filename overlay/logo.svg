<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 3 58 58" width="64" height="64">
  <!-- Warm dark charcoal background -->
  <rect width="64" height="64" fill="#26211D"/>

  <!-- PCB annular ring — 300° arc, gap at 3 o'clock (right side).
       Centre (32,32), radius 24; terminals at 30° and 330°:
         30°:  (32+24·cos30°,  32+24·sin30°)  = (52.8, 44)
         330°: (32+24·cos330°, 32+24·sin330°) = (52.8, 20) -->
  <path d="M 52.8 44 A 24 24 0 1 1 52.8 20"
        fill="none"
        stroke="#935F16"
        stroke-width="4.5"
        stroke-linecap="round"/>

  <!-- Switch arm: from lower terminal, opening toward upper-right -->
  <path d="M 52.8 44 A 24 24 0 0 0 60 33"
        fill="none"
        stroke="#935F16"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- Terminal pads — via treatment: copper annular ring + dark drill hole -->
  <circle cx="52.8" cy="44" r="5.5" fill="#935F16"/>
  <circle cx="52.8" cy="44" r="2.5" fill="#26211D"/>
  <circle cx="52.8" cy="20" r="5.5" fill="#935F16"/>
  <circle cx="52.8" cy="20" r="2.5" fill="#26211D"/>

  <!-- Centre node dot -->
  <circle cx="32" cy="32" r="5" fill="#935F16"/>
</svg>
