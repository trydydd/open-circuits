ledger:
  project: open-circuits
  scope: |
    Workstream A — overlay enhancements that benefit web, ZIM, and the
    Android app. Settings panel, bookmarks + last-read, in-app search,
    PWA manifest + icons.
  source_of_truth:
    plan: /root/.claude/plans/what-work-would-it-serene-orbit.md
    spec: open-circuits-spec.md
    instructions: CLAUDE.md
  branch_strategy: one feature branch per task, PR into main, squash-merge
  python: ">=3.10"
  test_runner: pytest
  build_command: make build
  test_command: make test

# ──────────────────────────────────────────────────────────────────────────────
# Global guardrails — apply to every task. Violations fail review automatically.
# ──────────────────────────────────────────────────────────────────────────────
guardrails:
  positive:
    - |
      All output under output/html/ must remain fully self-contained.
      The validator at overlay/inject_overlay.py:354 must continue to
      pass on every build.
    - |
      Vanilla JavaScript only — DOM APIs and ES2020. No build step,
      no transpiler, no bundler, no minifier, no TypeScript.
    - |
      All new JS files must work with `<noscript>` gracefully — pages
      remain fully readable and navigable without JS.
    - |
      All new CSS must respect prefers-color-scheme as the default;
      any manual override is a layer ON TOP of, not replacement for,
      system preferences.
    - |
      All new persistent state lives in localStorage under the `oc:`
      namespace — for example `oc:font-scale`, `oc:theme`,
      `oc:bookmarks`, `oc:last-read`.
    - |
      URL paths under output/html/ must not change. Hearth integration
      depends on stable paths such as DC/DC_N.html, AC/AC_N.html.
    - Every PR ships pytest tests written first (TDD red-green-refactor).
    - |
      Code must be print-friendly — existing @media print styles must
      keep working; interactive controls hidden in print.
  taboos:
    - |
      NO external URLs in any committed file under overlay/ or output/.
      No CDN, no Google Fonts, no analytics, no telemetry.
    - |
      NO npm, package.json, node_modules, yarn.lock, or any Node.js
      tooling added to the repo.
    - |
      NO new Python deps beyond what is in requirements.txt /
      requirements-dev.txt without explicit approval.
    - |
      NO JavaScript framework — no React, Vue, Svelte, Alpine, htmx,
      jQuery.
    - NO TypeScript, NO JSX, NO CSS preprocessors (Sass, Less, PostCSS).
    - |
      NO emojis in committed source, comments, UI text, or
      documentation unless the user explicitly requests them.
    - |
      NO new top-level Markdown docs files (e.g. SETTINGS.md,
      SEARCH.md). Extend the existing docs/BUILDING.md or
      open-circuits-spec.md if documentation is needed.
    - |
      NO comments that explain WHAT the code does. Only WHY-comments
      where the reason is non-obvious.
    - |
      NO backwards-compatibility shims, polyfills, or "removed for X"
      placeholders for removed code.
    - |
      NO renaming of upstream-derived files (DC_1.html etc.) or
      changes to the path normalisation in overlay/inject_overlay.py
      that would alter the URL space.
    - |
      NO direct DOM manipulation in CSS — content attr() is fine, but
      no JS-injected utility classes that bypass the existing class
      system.
    - |
      NO removal or rewording of the attribution footer or LICENSE.txt
      / ATTRIBUTION.md content.
    - |
      NO Claude session links or "Generated by Claude" footers in
      commits, PR bodies, code comments, or UI strings.

# ──────────────────────────────────────────────────────────────────────────────
# Tasks
# ──────────────────────────────────────────────────────────────────────────────
tasks:

  - id: A1
    title: Settings panel — font scale and manual theme override
    intent: |
      Let readers bump body text size and force light/dark theme
      without relying on OS settings. Persists across reloads and
      works on web, inside the ZIM, and inside the Android WebView.
    estimated_complexity: S
    dependencies: []
    files_in:
      - overlay/css/open-circuits.css
      - overlay/templates/header.html
      - overlay/inject_overlay.py
    files_out_new:
      - overlay/js/settings.js
      - tests/test_settings.py
    files_out_modified:
      - overlay/css/open-circuits.css
      - overlay/templates/header.html
      - overlay/inject_overlay.py

    test_first:
      - file: tests/test_settings.py
        cases:
          - name: settings_js_is_copied_to_output
            asserts: |
              output/html/js/settings.js exists after `make build`.
          - name: settings_button_present_in_every_chapter
            asserts: |
              For every output/html/**/*.html, the parsed soup contains
              a button with id="oc-settings-toggle" and an
              aria-label attribute set.
          - name: html_root_starts_with_no_data_attrs
            asserts: |
              The <html> tag in source output has no data-theme or
              data-font-scale attributes — they are applied at runtime
              by JS.
          - name: css_defines_font_scale_overrides
            asserts: |
              overlay/css/open-circuits.css contains rule selectors for
              [data-font-scale="lg"] and [data-font-scale="xl"] that
              modify --oc-font-size or an equivalent CSS custom
              property.
          - name: css_defines_manual_theme_overrides
            asserts: |
              overlay/css/open-circuits.css contains rule selectors for
              [data-theme="dark"] and [data-theme="light"] and these
              selectors win over the @media (prefers-color-scheme)
              block — they appear later in source or use higher
              specificity.
          - name: settings_panel_hidden_for_noscript
            asserts: |
              The settings popover container has the `hidden` attribute
              by default OR is wrapped such that a non-JS user never
              sees an inert empty panel.
          - name: no_external_resource_urls
            asserts: |
              The build's existing external-URL validator at
              overlay/inject_overlay.py:354 still passes.

    work:
      - |
        Add CSS variables and override rules in
        overlay/css/open-circuits.css. Three font scales — md (default),
        lg, xl — implemented via a single --oc-font-size variable
        scaled by data-font-scale on <html>. Two manual theme
        overrides via data-theme on <html>; rules placed AFTER the
        @media (prefers-color-scheme) block.
      - |
        Create overlay/js/settings.js. Module IIFE; no globals other
        than window.ocSettings (read-only API). On DOMContentLoaded:
        read oc:font-scale (default "md") and oc:theme (default
        "auto") from localStorage; apply them as data-* attributes
        on document.documentElement; bind the toggle button to
        show/hide a popover whose markup already exists in
        header.html; bind change handlers that write back to
        localStorage and re-apply attributes. Must be safe to load
        with `defer` and must no-op cleanly if localStorage throws
        (private browsing).
      - |
        Add the settings button + popover markup to
        overlay/templates/header.html. Inline SVG icon (gear). Button
        always rendered; popover content visually hidden until
        toggled — the `hidden` attribute removed by JS.
      - |
        Update overlay/inject_overlay.py to copy js/settings.js into
        output/html/js/ and add `<script src="js/settings.js" defer>`
        to every page. Place the script tag AFTER navigation.js so
        both load in parallel but settings activates only after DOM
        is ready.
      - Run `make build` and `make test`; iterate until green.

    done_when:
      - "`make build` exits 0 with no warnings."
      - "`make test` passes including all tests from tests/test_settings.py."
      - |
        Manual smoke test — open output/html/index.html, click the
        settings button, change font scale to xl. Body font-size
        visibly larger; reload page; setting persists; switch theme
        to dark while OS is light, page goes dark; clear localStorage
        and reload, returns to OS default.
      - |
        Lighthouse accessibility score on output/html/index.html >= 95
        with no regression vs current main.
      - "Diff in overlay/css/open-circuits.css adds < 80 lines."
      - |
        overlay/js/settings.js is < 120 lines and contains zero
        third-party imports.

    taboos:
      - |
        Do NOT introduce a third theme — no sepia, no high-contrast.
        Only light + dark + auto.
      - |
        Do NOT animate the popover with anything more elaborate than
        a CSS transition on opacity or transform. No JS animation
        libraries.
      - |
        Do NOT add a "system" theme picker as a separate option —
        `auto` already means follow OS.
      - |
        Do NOT persist anything beyond oc:font-scale and oc:theme in
        this task. Bookmarks belong to A2.
      - Do NOT add a separate stylesheet file. Extend overlay/css/open-circuits.css.
      - |
        Do NOT use `!important` to win the theme override. Use
        selector order or specificity.
      - |
        Do NOT add unit ranges beyond md / lg / xl. No slider, no
        continuous scale.

  - id: A2
    title: Bookmarks and last-read
    intent: |
      Save the reader's place automatically and let them mark chapters
      they want to come back to. Surfaces in the existing sidebar TOC
      built by overlay/js/navigation.js.
    estimated_complexity: M
    dependencies: [A1]
    files_in:
      - overlay/js/navigation.js
      - overlay/templates/header.html
      - overlay/css/open-circuits.css
    files_out_new:
      - overlay/js/bookmarks.js
      - tests/test_bookmarks.py
    files_out_modified:
      - overlay/js/navigation.js
      - overlay/css/open-circuits.css
      - overlay/inject_overlay.py

    test_first:
      - file: tests/test_bookmarks.py
        cases:
          - name: bookmarks_js_in_output
            asserts: output/html/js/bookmarks.js exists.
          - name: bookmark_button_in_every_chapter
            asserts: |
              Every chapter HTML page (DC_*, AC_*, SEMI_*, DIGI_*,
              REF_*, EXP_*) contains a button with
              id="oc-bookmark-toggle". Volume index pages
              (DC/index.html etc.) MAY also contain it. The site
              root index.html MUST NOT contain it.
          - name: storage_keys_namespaced
            asserts: |
              Static analysis of overlay/js/bookmarks.js — every
              localStorage.setItem / getItem / removeItem call uses a
              key starting with "oc:". Bookmark list key is exactly
              "oc:bookmarks"; last-read key is exactly "oc:last-read".
          - name: bookmarks_module_exposes_api
            asserts: |
              overlay/js/bookmarks.js defines a single global
              window.ocBookmarks with at least these methods —
              add(path, title), remove(path), list(),
              isBookmarked(path), recordRead(path, title, scrollPct).
          - name: noscript_safe
            asserts: |
              The bookmark button is hidden via CSS when JS is
              unavailable — has class oc-js-only or equivalent that
              requires JS to unhide. Verified by parsing CSS for the
              rule.

    work:
      - |
        Create overlay/js/bookmarks.js. IIFE exposing
        window.ocBookmarks. On every page load, detect canonical path
        of current chapter (location.pathname under output/html
        prefix), record into oc:last-read with timestamp + scroll
        percentage (capture scroll on a debounced scrollend listener,
        NOT every scroll event). Provide add / remove / list APIs for
        the bookmark button to call. All errors from localStorage are
        caught and silently no-op (private browsing, quota).
      - |
        Add a bookmark button (inline SVG bookmark icon, two states —
        on and off) to overlay/templates/header.html. Initially
        `hidden`; bookmarks.js unhides it when applicable.
      - |
        Extend overlay/js/navigation.js so the sidebar TOC, when
        present, renders two extra sections at the top — first
        "Resume" (single entry from oc:last-read, omitted if absent),
        second "Bookmarks" (entries from oc:bookmarks, omitted if
        empty). Sections use existing TOC styles where possible.
      - |
        Add CSS in overlay/css/open-circuits.css for the bookmark
        button two states (filled vs outline), the resume +
        bookmarks sidebar sections, and an `.oc-js-only { display:
        none }` class plus a JS-side unhide on DOMContentLoaded (or
        rely on bookmarks.js enabling).
      - |
        Wire overlay/inject_overlay.py to copy bookmarks.js into
        output/html/js/ and inject the script tag with `defer`.

    done_when:
      - All test_first cases green.
      - "`make build` and `make test` exit 0."
      - |
        Manual smoke test — open DC/DC_3.html, scroll halfway,
        navigate away, reload index. Sidebar shows "Resume DC_3 ~50%".
        Click the bookmark button on DC_3, navigate to AC/AC_1.html;
        sidebar shows DC_3 under Bookmarks. Click bookmark again on
        DC_3, removed.
      - |
        All localStorage writes are debounced or one-shot — no
        continuous writes during scroll. Verify by JSON.stringify
        (localStorage) before and after scrolling 1000 px; only one
        entry should change, and only after scrollend fires.
      - |
        Bundle delta — overlay/js/bookmarks.js < 4 KB minified
        equivalent. We don't minify; just keep source < 200 lines.

    taboos:
      - |
        Do NOT add a separate "history" view. Last-read is a single
        entry, not a list.
      - |
        Do NOT use IndexedDB, cookies, sessionStorage, or any other
        storage mechanism. localStorage only.
      - Do NOT add export / import buttons for bookmarks. Out of scope.
      - |
        Do NOT sync bookmarks across devices, IPFS, or anywhere.
        Strictly local.
      - |
        Do NOT use a scroll event listener — must be scrollend with
        debouncing. Battery-friendly mobile is non-negotiable.
      - |
        Do NOT mutate the existing TOC builder beyond appending two
        sections. Existing sidebar rendering must remain pixel-stable
        for chapters that have no bookmarks and no last-read.
      - |
        Do NOT change the sidebar HTML structure for non-chapter
        pages — LICENSE.txt, ATTRIBUTION.md, root index.

  - id: A3a
    title: Vendor MiniSearch into overlay/js/vendor/
    intent: |
      Bring the search library into the repo so output is fully
      self-contained. Pinning happens in this PR; downstream tasks
      depend on it.
    estimated_complexity: XS
    dependencies: []
    files_out_new:
      - overlay/js/vendor/minisearch.min.js
      - overlay/js/vendor/minisearch.LICENSE
      - tests/test_vendor.py

    test_first:
      - file: tests/test_vendor.py
        cases:
          - name: minisearch_present
            asserts: |
              overlay/js/vendor/minisearch.min.js exists and is > 0
              bytes.
          - name: minisearch_pinned_version
            asserts: |
              The first 200 bytes of minisearch.min.js contain the
              string MiniSearch and a version comment matching the
              pinned version recorded in
              overlay/js/vendor/minisearch.LICENSE.
          - name: license_file_present
            asserts: |
              overlay/js/vendor/minisearch.LICENSE exists and contains
              the string "MIT" (MiniSearch is MIT-licensed).
          - name: integrity_recorded
            asserts: |
              overlay/js/vendor/minisearch.LICENSE contains the SHA256
              hash of minisearch.min.js — line `sha256 <hex>`.
          - name: minisearch_copied_to_output
            asserts: |
              After `make build`, output/html/js/vendor/minisearch.min.js
              exists and matches overlay version byte-for-byte.

    work:
      - |
        Download MiniSearch from the npm registry tarball — NOT a CDN
        URL at runtime. Vendor the file. Record exact version,
        integrity hash, and source URL in
        overlay/js/vendor/minisearch.LICENSE.
      - |
        Pinned version — choose the latest stable major at time of
        commit; document the choice in the LICENSE file.
      - |
        Update overlay/inject_overlay.py to copy overlay/js/vendor/**
        recursively to output/html/js/vendor/.
      - Run external-URL validator — must still pass.

    done_when:
      - All test_first cases green.
      - File exists, license recorded, hash recorded.
      - Build passes external-URL validator.

    taboos:
      - Do NOT use a CDN reference at runtime. The file must live in the repo.
      - |
        Do NOT vendor a non-minified version. Production size matters
        for ZIM and APK.
      - |
        Do NOT vendor any other search library at the same time. One
        choice; commit to it. If MiniSearch turns out wrong, swap in
        a separate task — don't ship two.
      - |
        Do NOT modify the vendored file. If a patch is needed,
        document it in the LICENSE file and apply via a sibling
        .patch file.

  - id: A3b
    title: Build-time search index generator
    intent: |
      Precompute a JSON search index of every chapter so the runtime
      search is fast and offline.
    estimated_complexity: M
    dependencies: [A3a]
    files_in:
      - overlay/inject_overlay.py
      - build/build_html.py
    files_out_new:
      - overlay/build_search_index.py
      - tests/test_search_index.py
    files_out_modified:
      - build/build_html.py
      - overlay/inject_overlay.py

    test_first:
      - file: tests/test_search_index.py
        cases:
          - name: index_file_emitted
            asserts: |
              output/html/search-index.json exists after `make build`.
          - name: index_is_valid_json
            asserts: |
              json.loads(output/html/search-index.json) succeeds and
              returns a dict with keys "version", "documents", and
              "fields".
          - name: every_volume_indexed
            asserts: |
              For each prefix in {DC, AC, Semi, Digital, Ref, Exper}
              there exists at least one document in the index whose
              `path` starts with that prefix.
          - name: every_chapter_indexed
            asserts: |
              For each output/html/{DC,AC,Semi,Digital,Ref,Exper}/*.html
              file (excluding index.html), exactly one document with
              that `path` exists in the index.
          - name: document_fields_complete
            asserts: |
              Every entry has non-empty `path`, `title`, and `body`.
              Body is plain text, no HTML tags.
          - name: index_size_under_limit
            asserts: |
              os.path.getsize(output/html/search-index.json)
              < 8 * 1024 * 1024 (8 MB hard cap; expected ~3-4 MB).
          - name: index_deterministic
            asserts: |
              Running build twice produces byte-identical
              search-index.json. Test runs build twice, hashes both,
              compares.

    work:
      - |
        Create overlay/build_search_index.py. Standalone script
        invoked from build/build_html.py after the inject pass. Walks
        output/html/{DC,AC,Semi,Digital,Ref,Exper}/*.html, parses
        with BeautifulSoup, extracts:
        path — relative path from output/html (e.g. DC/DC_1.html);
        title — text of <title> or first <h1> / <h2>;
        body — concatenated text from main content area, excluding
        header, footer, sidebar, code blocks of SPICE listings if
        too noisy. Sort documents by path before writing
        (determinism).
      - |
        Output schema — version 1; fields ["title", "body"];
        documents [{path, title, body}].
      - Strip body whitespace consistently (collapse runs to single space).
      - |
        Add a CLI entry — `python overlay/build_search_index.py
        --input output/html --output output/html/search-index.json`.
      - |
        Wire into build/build_html.py so `make build` calls it after
        inject and before integrity check.
      - |
        Add a unit test that builds the index against a synthetic
        2-page tree and verifies the output structure.

    done_when:
      - All test_first cases green.
      - |
        `make build` calls the index builder;
        output/html/search-index.json present.
      - |
        Two consecutive `make clean && make build` runs produce
        byte-identical search-index.json (verified by sha256sum).
      - Index size between 1 MB and 8 MB.
      - |
        Generator handles a missing volume gracefully — emits warning,
        not a crash. Verified by deleting one volume in a temp tree
        and rebuilding.

    taboos:
      - Do NOT include sidebar, header, or footer text in the body field.
      - |
        Do NOT include image alt text or filenames in the body field.
        Noise, not signal.
      - |
        Do NOT pre-tokenize or pre-stem in the index. MiniSearch does
        that at load time. Ship the raw text.
      - Do NOT add language detection. Content is English.
      - |
        Do NOT compress the index file (no .gz at rest). Web servers
        and APKs compress as they wish; we ship raw JSON for
        inspectability.
      - |
        Do NOT add fuzzy fields like author, date, tags — those don't
        exist in the source.
      - Do NOT crawl the site by following links. Walk the filesystem.

  - id: A3c
    title: Search UI (input, results panel, keyboard shortcut)
    intent: |
      The visible search feature — an input in the header, a results
      panel that uses the precomputed index, and `/` keyboard shortcut.
    estimated_complexity: M
    dependencies: [A3a, A3b]
    files_in:
      - overlay/templates/header.html
      - overlay/css/open-circuits.css
      - overlay/js/vendor/minisearch.min.js
      - output/html/search-index.json
    files_out_new:
      - overlay/js/search.js
      - tests/test_search_ui.py
    files_out_modified:
      - overlay/templates/header.html
      - overlay/css/open-circuits.css
      - overlay/inject_overlay.py

    test_first:
      - file: tests/test_search_ui.py
        cases:
          - name: search_js_in_output
            asserts: output/html/js/search.js exists.
          - name: search_input_in_every_page
            asserts: |
              Every output/html/**/*.html contains an
              <input type="search"> with id="oc-search-input" and an
              associated results container with id="oc-search-results".
          - name: search_input_skipped_for_noscript
            asserts: |
              The search input is wrapped in a container hidden via
              CSS (display none) by default and unhidden via JS.
          - name: lazy_index_load
            asserts: |
              Static analysis of overlay/js/search.js — search-index
              .json is fetched only on first interaction with the
              input (input or focus event), not on page load.
          - name: minisearch_loaded_via_script_tag
            asserts: |
              Every page includes
              <script src=".../js/vendor/minisearch.min.js" defer>
              BEFORE search.js.
          - name: keyboard_shortcut_documented
            asserts: |
              overlay/js/search.js binds a keydown listener that
              activates the input when the user presses "/" (and is
              NOT already focused in another input or textarea).

    work:
      - |
        Add the search input + results container to
        overlay/templates/header.html. Input has placeholder
        "Search...", type=search, autocomplete=off. Results
        container is initially empty.
      - |
        Create overlay/js/search.js. On first user interaction with
        the input, fetch search-index.json (relative path resolved
        via a constant computed from
        document.documentElement.dataset.root or a path-walking
        heuristic — chapters can be 1 or 2 levels deep). Initialize
        MiniSearch with fields ["title", "body"] and storeFields
        ["path", "title"]. Render up to 30 results with title, path
        (volume label), and a snippet of matching body text.
      - |
        Bind the "/" key to focus the input. Esc clears and blurs.
      - |
        Style results in overlay/css/open-circuits.css. Reuse
        existing sidebar / menu styling tokens.
      - |
        Update overlay/inject_overlay.py to inject both
        vendor/minisearch and js/search.js script tags on every page.

    done_when:
      - All test_first cases green.
      - |
        Manual — open DC/DC_1.html, press `/`, type "capacitor". At
        least one result links to a chapter; click it, navigates.
      - |
        Network panel in DevTools shows search-index.json fetched
        only AFTER the user interacts with the input.
      - |
        Lighthouse performance score on a chapter page does not
        regress by more than 2 points vs main.
      - "search.js is < 200 lines."

    taboos:
      - Do NOT auto-fetch the search index on page load. Lazy only.
      - |
        Do NOT add fuzzy / typo settings beyond MiniSearch defaults
        at first ship. Tune later if users complain.
      - |
        Do NOT highlight matches by injecting <mark> into the
        chapter body. Snippets in the results panel only.
      - |
        Do NOT add advanced search syntax — AND / OR / NOT operators,
        field prefixes. Default behaviour only.
      - |
        Do NOT add a separate /search page. The dropdown panel is
        the whole UI.
      - |
        Do NOT use IntersectionObserver to load the index — explicit
        user interaction only.
      - Do NOT preload the index from a service worker.
      - |
        Do NOT add analytics on search queries. Queries never leave
        the device.

  - id: A4
    title: PWA manifest + icons (web installability + asset feed for app)
    intent: |
      Make the website installable on Chrome / Android, and produce
      the icon set that the Android app will reuse.
    estimated_complexity: S
    dependencies: []
    files_in:
      - overlay/logo.svg
      - overlay/inject_overlay.py
    files_out_new:
      - overlay/templates/manifest.json
      - overlay/icons/icon-192.png
      - overlay/icons/icon-512.png
      - overlay/icons/icon-512-maskable.png
      - overlay/icons/apple-touch-icon.png
      - overlay/icons/README
      - tests/test_manifest.py
    files_out_modified:
      - overlay/inject_overlay.py

    test_first:
      - file: tests/test_manifest.py
        cases:
          - name: manifest_in_output
            asserts: output/html/manifest.json exists.
          - name: manifest_is_valid_json
            asserts: |
              json.loads succeeds; has name, short_name, start_url,
              display, theme_color, background_color, icons (list).
          - name: icon_pngs_in_output
            asserts: |
              output/html/icons/{icon-192.png, icon-512.png,
              icon-512-maskable.png, apple-touch-icon.png} all exist.
          - name: manifest_link_on_every_page
            asserts: |
              Every output/html/**/*.html contains
              <link rel="manifest" href=".../manifest.json"> with
              correct relative href for that page's depth.
          - name: theme_color_meta_present
            asserts: |
              Every page has <meta name="theme-color" content="...">
              with two entries (light + media query for dark) OR one
              entry that suits both schemes.
          - name: apple_touch_icon_link
            asserts: Every page has <link rel="apple-touch-icon" ...>.
          - name: no_external_urls_regression
            asserts: |
              The existing external-URL validator continues to pass.

    work:
      - |
        Generate PNG icons from overlay/logo.svg. Sizes — 192, 512,
        512 maskable (with safe area), 180 (apple-touch). Use Pillow
        or cairosvg in a build-time helper, OR pre-render and commit.
        If pre-rendered, document the rendering command in
        overlay/icons/README so they can be regenerated reproducibly.
      - |
        Create overlay/templates/manifest.json template with
        placeholders only if needed. The template can be a static
        file copied verbatim if no per-page templating is required.
      - |
        Update overlay/inject_overlay.py to copy overlay/icons/* to
        output/html/icons/, copy manifest.json to output/html/,
        inject <link rel="manifest"> with correct relative path on
        every page (account for chapter depth), inject
        <link rel="apple-touch-icon"> on every page, and inject
        <meta name="theme-color"> on every page.
      - |
        Run `make build`; open output/html/index.html in Chrome
        DevTools Application -> Manifest pane; confirm no errors.

    done_when:
      - All test_first cases green.
      - Lighthouse PWA installability check passes on output/html/index.html.
      - |
        Adding the site to Android home screen via Chrome shows the
        Open Circuits icon, not a generic globe.
      - Icon files committed; rendering instructions in overlay/icons/README.

    taboos:
      - Do NOT register a service worker in this task. Out of scope.
      - |
        Do NOT add screenshots[] or shortcuts[] to the manifest in
        this task. Basic install only.
      - |
        Do NOT use SVG as the only icon source for the manifest. iOS
        and many Android launchers want PNG.
      - Do NOT add multiple translated manifests; English only for v1.
      - |
        Do NOT change overlay/logo.svg dimensions or colors as part
        of this task.

  - id: A5
    title: Documentation — mobile / PWA section in README
    intent: |
      Tell readers and packagers that the website is now installable
      and that an Android app is in flight (companion repo).
    estimated_complexity: XS
    dependencies: [A1, A2, A3c, A4]
    files_in:
      - README.md
    files_out_modified:
      - README.md
    files_out_new:
      - tests/test_readme.py

    test_first:
      - file: tests/test_readme.py
        cases:
          - name: readme_mentions_pwa
            asserts: |
              README.md contains the string "manifest" or "Install".
          - name: readme_links_to_companion
            asserts: |
              README.md contains the literal string
              "open-circuits-android" and a link to its repo.
          - name: readme_lists_new_features
            asserts: |
              README.md contains the words "search", "bookmarks", and
              "settings" (or "font") in a new section.

    work:
      - |
        Add a "Reading on a phone" or "Installing as an app"
        subsection with two short paragraphs.
      - |
        Link the companion Android repo by name. URL TBD until the
        repo exists; use a relative-future URL in a placeholder if
        needed and put a TODO note in this task's PR description,
        NOT in the README.

    done_when:
      - All test_first cases green.
      - README renders cleanly on github.com (manual check).

    taboos:
      - Do NOT create a new top-level docs file. Edit README.md only.
      - Do NOT add screenshots in this task.
      - |
        Do NOT add a CHANGELOG.md or RELEASE-NOTES.md unless asked.

# ──────────────────────────────────────────────────────────────────────────────
# Verification — full repo, after all tasks merged
# ──────────────────────────────────────────────────────────────────────────────
verification:
  commands:
    - rm -rf output/html
    - make build
    - make test
    - |
      python -c "import json; idx=json.load(open('output/html/search-index.json')); print(len(idx['documents']))"
  manual_checks:
    - Open output/html/index.html in Chrome -> Lighthouse -> PWA = pass.
    - |
      Settings popover — change font scale + theme; reload; persists.
    - Bookmark a chapter, navigate elsewhere, come back via sidebar.
    - |
      Press "/" anywhere; search "Ohm"; click result; lands on the
      correct chapter.
    - |
      DevTools Network — only one search-index.json request, on first
      search-input interaction.
    - DevTools Application -> Manifest — no errors.
    - |
      With JS disabled — every page is fully readable; no broken UI;
      attribution footer intact.
  metrics:
    - "Total output/html size delta vs current main: < +10 MB."
    - "Lighthouse Performance >= 90 on a representative chapter."
    - "Lighthouse Accessibility >= 95."
    - "Lighthouse Best Practices >= 95."

# ──────────────────────────────────────────────────────────────────────────────
# Hand-off notes for downstream models
# ──────────────────────────────────────────────────────────────────────────────
handoff_notes:
  red_flags_to_pause_on:
    - |
      You find yourself wanting to add a JS framework or build step.
      Stop and re-read guardrails. The answer is no.
    - |
      A test you wrote is hard to verify because the implementation
      "needs" a network call. Stop. The whole project is offline-only.
    - |
      You're about to write a Markdown doc to explain a feature.
      Stop. Update the test names instead, or extend README.md.
    - |
      A library you're vendoring has a transitive dep. Stop.
      MiniSearch is single-file by design; if a tool requires
      multiple files, wrong tool.
  when_in_doubt:
    - Read CLAUDE.md again, especially the Design Context section.
    - |
      Read open-circuits-spec.md sections "Approach" and
      "Repository Structure".
    - Prefer doing nothing over adding something speculative.
