Title: Open Circuits — A Portable Electronics Reference
Description: >
  Open Circuits is a portable, offline-ready electronics reference derived from
  Tony R. Kuphaldt's "Lessons In Electric Circuits" — a comprehensive, freely
  licensed textbook covering DC, AC, semiconductors, digital logic, reference
  tables, and experimental projects. This edition adds a clean navigation
  overlay and is packaged for use with the Kiwix offline reader.
